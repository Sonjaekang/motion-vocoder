<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Motion Vocoder</title>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #08080f;
  color: #c0c0e0;
  font-family: 'Courier New', monospace;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
#header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 24px;
  background: #04040a;
  border-bottom: 1px solid #1a1a3a;
  flex-shrink: 0;
}
#logo { font-size: 12px; letter-spacing: 4px; color: #6666ff; text-transform: uppercase; }
#status { font-size: 10px; letter-spacing: 2px; color: #333366; }
#status.active { color: #44ffaa; }

#main { display: flex; flex: 1; min-height: 0; }

#cam-wrap {
  position: relative;
  width: 520px;
  flex-shrink: 0;
  background: #030308;
  border-right: 1px solid #1a1a3a;
}
#video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); display: block; }
#hand-canvas {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  transform: scaleX(-1);
  pointer-events: none;
}

#panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 32px;
  gap: 32px;
}

.effect-block { display: flex; flex-direction: column; gap: 14px; }

.effect-header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
}
.effect-title {
  font-size: 10px;
  letter-spacing: 3px;
  color: #333366;
  text-transform: uppercase;
}
.effect-hand {
  font-size: 9px;
  letter-spacing: 2px;
  color: #222244;
}
.effect-value {
  font-size: 28px;
  font-weight: bold;
  letter-spacing: 2px;
  font-variant-numeric: tabular-nums;
  transition: color 0.1s;
}
.val-l { color: #4422cc; }
.val-r { color: #cc2244; }
.val-l.active { color: #8844ff; }
.val-r.active { color: #ff4466; }

.big-track {
  height: 6px;
  background: #0a0a18;
  border-radius: 3px;
  overflow: hidden;
}
.big-fill {
  height: 100%;
  border-radius: 3px;
  width: 0%;
  transition: width 0.05s;
}
.fill-l { background: linear-gradient(90deg, #2222aa, #8833ff); }
.fill-r { background: linear-gradient(90deg, #aa2244, #ff4488); }

/* 핀치 시각화 */
.pinch-viz {
  display: flex;
  align-items: center;
  gap: 10px;
  height: 40px;
}
.pinch-circle {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 1.5px solid #1a1a4a;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
  transition: border-color 0.1s, background 0.1s;
}
.pinch-gap-track {
  flex: 1;
  height: 2px;
  background: #0f0f22;
  border-radius: 1px;
  position: relative;
}
.pinch-gap-fill {
  position: absolute;
  top: 0; left: 0;
  height: 100%;
  border-radius: 1px;
  transition: width 0.06s;
}
.gap-l { background: #6633ff; }
.gap-r { background: #ff3366; }
.pinch-label {
  font-size: 9px;
  letter-spacing: 1px;
  color: #222244;
  flex-shrink: 0;
  width: 30px;
  text-align: right;
  font-variant-numeric: tabular-nums;
}

.divider {
  height: 1px;
  background: #111128;
}

/* 오버레이 */
#overlay {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 14px;
  background: rgba(3,3,10,0.93);
  z-index: 20;
}
#overlay p { font-size: 10px; color: #333366; letter-spacing: 1px; }
#overlay p.sub { color: #1a1a44; font-size: 9px; }
#activate-btn {
  padding: 11px 32px;
  background: #1a1acc;
  color: #aaaaff;
  font-family: 'Courier New', monospace;
  font-size: 10px;
  letter-spacing: 4px;
  text-transform: uppercase;
  border: 1px solid #3333ff;
  cursor: pointer;
  border-radius: 2px;
}
#activate-btn:hover { background: #2222ee; }
</style>
</head>
<body>

<div id="header">
  <div id="logo">Motion Vocoder</div>
  <div id="status">● STANDBY</div>
</div>

<div id="main">
  <div id="cam-wrap">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="hand-canvas"></canvas>
    <div id="overlay">
      <p>카메라 + 마이크 권한이 필요합니다</p>
      <button id="activate-btn" onclick="initAll()">ACTIVATE</button>
      <p class="sub">엄지 + 검지 간격으로 이펙트를 조절하세요</p>
    </div>
  </div>

  <div id="panel">

    <!-- Distortion (왼손) -->
    <div class="effect-block">
      <div class="effect-header">
        <div class="effect-title">Distortion</div>
        <div class="effect-hand">왼손 핀치</div>
      </div>
      <div class="effect-value val-l" id="dist-value">0%</div>
      <div class="big-track"><div class="big-fill fill-l" id="dist-fill"></div></div>
      <div class="pinch-viz">
        <div class="pinch-circle" id="left-circle" style="border-color:#2222aa;">👆</div>
        <div class="pinch-gap-track">
          <div class="pinch-gap-fill gap-l" id="left-gap"></div>
        </div>
        <div class="pinch-label" id="left-dist-label">–</div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Reverb (오른손) -->
    <div class="effect-block">
      <div class="effect-header">
        <div class="effect-title">Reverb</div>
        <div class="effect-hand">오른손 핀치</div>
      </div>
      <div class="effect-value val-r" id="reverb-value">0%</div>
      <div class="big-track"><div class="big-fill fill-r" id="reverb-fill"></div></div>
      <div class="pinch-viz">
        <div class="pinch-circle" id="right-circle" style="border-color:#aa2244;">👆</div>
        <div class="pinch-gap-track">
          <div class="pinch-gap-fill gap-r" id="right-gap"></div>
        </div>
        <div class="pinch-label" id="right-reverb-label">–</div>
      </div>
    </div>

  </div>
</div>

<script>
let audioCtx, source, gainNode, distortionNode, convolver, dryGain, wetGain;
let distVal = 0, reverbVal = 0;
let leftPinch = 0, rightPinch = 0;

function lerp(a, b, t) { return a + (b - a) * t; }

function pinchDist(landmarks, idxA, idxB) {
  const a = landmarks[idxA], b = landmarks[idxB];
  return Math.sqrt((a.x - b.x) ** 2 + (a.y - b.y) ** 2);
}

async function initAll() {
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('status').textContent = '● INIT...';

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    const video = document.getElementById('video');
    video.srcObject = stream;

    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const micStream = new MediaStream(stream.getAudioTracks());
    source = audioCtx.createMediaStreamSource(micStream);

    // Distortion
    distortionNode = audioCtx.createWaveShaper();
    distortionNode.oversample = '4x';
    setDistortion(0);

    // Reverb (convolver)
    convolver = audioCtx.createConvolver();
    setReverb(0);

    dryGain = audioCtx.createGain(); dryGain.gain.value = 1;
    wetGain = audioCtx.createGain(); wetGain.gain.value = 0;
    gainNode = audioCtx.createGain(); gainNode.gain.value = 1.3;

    // source → distortion → dry/wet split → gain → out
    source.connect(distortionNode);
    distortionNode.connect(dryGain);
    distortionNode.connect(convolver);
    convolver.connect(wetGain);
    dryGain.connect(gainNode);
    wetGain.connect(gainNode);
    gainNode.connect(audioCtx.destination);

    document.getElementById('status').textContent = '● ACTIVE';
    document.getElementById('status').className = 'active';

    initHands(video);

  } catch(e) {
    document.getElementById('overlay').style.display = 'flex';
    document.getElementById('status').textContent = '● ERROR';
    alert('오류: ' + e.message);
  }
}

function setDistortion(amount) {
  const k = amount * 600;
  const n = 512;
  const curve = new Float32Array(n);
  for (let i = 0; i < n; i++) {
    const x = (i * 2) / n - 1;
    curve[i] = k > 0 ? ((Math.PI + k) * x) / (Math.PI + k * Math.abs(x)) : x;
  }
  distortionNode.curve = curve;
}

function setReverb(amount) {
  if (!audioCtx) return;
  const duration = 0.05 + amount * 6;
  const len = Math.floor(audioCtx.sampleRate * duration);
  const buf = audioCtx.createBuffer(2, len, audioCtx.sampleRate);
  for (let c = 0; c < 2; c++) {
    const d = buf.getChannelData(c);
    for (let i = 0; i < len; i++) {
      d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 1.2);
    }
  }
  convolver.buffer = buf;
}

let reverbTimer = null;
function applyEffects() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;

  // Distortion
  setDistortion(distVal);

  // Reverb wet/dry
  const wet = reverbVal * 0.9;
  wetGain.gain.setTargetAtTime(wet, t, 0.08);
  dryGain.gain.setTargetAtTime(1 - wet * 0.4, t, 0.08);

  // Rebuild reverb IR occasionally
  clearTimeout(reverbTimer);
  reverbTimer = setTimeout(() => setReverb(reverbVal), 200);
}

function initHands(video) {
  const canvas = document.getElementById('hand-canvas');
  const ctx = canvas.getContext('2d');

  const hands = new Hands({
    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
  });
  hands.setOptions({
    maxNumHands: 2,
    modelComplexity: 1,
    minDetectionConfidence: 0.75,
    minTrackingConfidence: 0.6
  });

  hands.onResults(results => {
    canvas.width = video.videoWidth || 640;
    canvas.height = video.videoHeight || 480;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    let leftFound = false, rightFound = false;

    if (results.multiHandLandmarks) {
      results.multiHandLandmarks.forEach((landmarks, i) => {
        const label = results.multiHandedness[i].label;
        // MediaPipe 거울 보정: 'Right' label = 화면상 왼손
        const isLeft = (label === 'Right');

        // 엄지(4) - 검지(8) 거리
        const raw = pinchDist(landmarks, 4, 8);
        // 정규화: 0.02(완전히 붙음) ~ 0.25(최대 벌림)
        const normalized = Math.min(1, Math.max(0, (raw - 0.02) / 0.23));

        const color = isLeft ? '#6633ff' : '#ff3366';
        drawHand(ctx, landmarks, canvas.width, canvas.height, color, normalized);

        // 엄지, 검지 핀치 포인트 강조
        [4, 8].forEach(idx => {
          ctx.beginPath();
          ctx.arc(landmarks[idx].x * canvas.width, landmarks[idx].y * canvas.height, 7, 0, Math.PI * 2);
          ctx.strokeStyle = color;
          ctx.lineWidth = 2;
          ctx.stroke();
        });
        // 두 점 연결선
        ctx.beginPath();
        ctx.moveTo(landmarks[4].x * canvas.width, landmarks[4].y * canvas.height);
        ctx.lineTo(landmarks[8].x * canvas.width, landmarks[8].y * canvas.height);
        ctx.strokeStyle = color + 'aa';
        ctx.lineWidth = 1.5;
        ctx.setLineDash([4, 4]);
        ctx.stroke();
        ctx.setLineDash([]);

        if (isLeft) {
          leftFound = true;
          leftPinch = lerp(leftPinch, normalized, 0.15);
          distVal = leftPinch;
        } else {
          rightFound = true;
          rightPinch = lerp(rightPinch, normalized, 0.15);
          reverbVal = rightPinch;
        }
      });
    }

    if (!leftFound)  { leftPinch  = lerp(leftPinch,  0, 0.05); distVal  = leftPinch; }
    if (!rightFound) { rightPinch = lerp(rightPinch, 0, 0.05); reverbVal = rightPinch; }

    applyEffects();
    updateUI(leftFound, rightFound);
  });

  const camera = new Camera(video, {
    onFrame: async () => { await hands.send({ image: video }); },
    width: 640, height: 480
  });
  camera.start();
}

function drawHand(ctx, landmarks, w, h, color, pinch) {
  const connections = [
    [0,1],[1,2],[2,3],[3,4],
    [0,5],[5,6],[6,7],[7,8],
    [0,9],[9,10],[10,11],[11,12],
    [0,13],[13,14],[14,15],[15,16],
    [0,17],[17,18],[18,19],[19,20],
    [5,9],[9,13],[13,17]
  ];
  ctx.strokeStyle = color + '55';
  ctx.lineWidth = 1.2;
  connections.forEach(([a, b]) => {
    ctx.beginPath();
    ctx.moveTo(landmarks[a].x * w, landmarks[a].y * h);
    ctx.lineTo(landmarks[b].x * w, landmarks[b].y * h);
    ctx.stroke();
  });
  landmarks.forEach((lm, i) => {
    ctx.beginPath();
    ctx.arc(lm.x * w, lm.y * h, i === 0 ? 5 : 2.5, 0, Math.PI * 2);
    ctx.fillStyle = color + (i === 0 ? 'ff' : '88');
    ctx.fill();
  });
}

function updateUI(leftFound, rightFound) {
  const dp = Math.round(distVal * 100);
  const rp = Math.round(reverbVal * 100);

  document.getElementById('dist-value').textContent = dp + '%';
  document.getElementById('dist-value').className = 'effect-value val-l' + (leftFound ? ' active' : '');
  document.getElementById('dist-fill').style.width = dp + '%';
  document.getElementById('left-gap').style.width = dp + '%';
  document.getElementById('left-dist-label').textContent = leftFound ? dp + '%' : '–';
  document.getElementById('left-circle').style.borderColor = leftFound ? '#8844ff' : '#2222aa';

  document.getElementById('reverb-value').textContent = rp + '%';
  document.getElementById('reverb-value').className = 'effect-value val-r' + (rightFound ? ' active' : '');
  document.getElementById('reverb-fill').style.width = rp + '%';
  document.getElementById('right-gap').style.width = rp + '%';
  document.getElementById('right-reverb-label').textContent = rightFound ? rp + '%' : '–';
  document.getElementById('right-circle').style.borderColor = rightFound ? '#ff4488' : '#aa2244';
}
</script>
</body>
</html>
